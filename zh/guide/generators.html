    <title>生成器 – Useful Tools</title>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: system-ui, sans-serif; line-height: 1.5; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; background: #1e1e2e; padding: 2rem; border-radius: 24px; }

<body>
<div class="container">
    <h1>生成器和计算器</h1>
    <ul>
        <li><strong>密码生成器</strong> – 随机密码，可设置长度和字符类型。</li>
        <li><strong>随机数生成器</strong> – 任意范围内的整数。</li>
        <li><strong>随机事实生成器</strong> – 各领域有趣的事实。</li>
        <li><strong>计算器</strong> – 基本算术运算。</li>
        <li><strong>Minecraft 昵称生成器</strong> – 独特的游戏名称。</li>
        <li><strong>CS2 武器生成器</strong> – 随机选择游戏中的武器。</li>
        <li><strong>工作名称生成器</strong> – 创意的职业名称。</li>
        <li><strong>每日小贴士</strong> – 健康与生产力建议。</li>
        <li><strong>演示翻译器</strong> – 仅支持四个单词 (hello, world, thank you, good morning)。</li>
    </ul>
