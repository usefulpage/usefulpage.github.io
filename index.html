        * {

            footer_text: "Documentation and reference"
        },
        zh: {
            hero_title: "Useful Tools 文档",
            hero_desc: "生成器、计算器、Python游戏、Minecraft工具和开发者API。",
            card1_title: "生成器和计算器",

            hero_desc: "Генератори, калькулятори, ігри на Python, інструменти Minecraft та API для розробників.",

            card1_desc: "Паролі, числа, факти, калькулятор, перекладач та інші корисні утиліти.",

            card4_desc: "Логування, адмін-панель, PWA, API та інструкції з встановлення.",
            card4_link: "/uk/dev/",
            footer_text: "Документація та довідкові матеріали"
        }
    };

    let currentLang = 'ru';

    function setLanguage(lang) {
        if (!translations[lang]) return;
        currentLang = lang;
        const t = translations[lang];
        document.documentElement.lang = lang;
        document.title = t.hero_title;
        document.getElementById('content').innerHTML = `
            <div class="hero">
                <h1>${t.hero_title}</h1>
                <p>${t.hero_desc}</p>
            </div>
            <div class="cards">
                <div class="card">
                    <h3>${t.card1_title}</h3>
                    <p>${t.card1_desc}</p>
                    <a href="${t.card1_link}">📖 ${t.card1_title}</a>
                </div>
                <div class="card">
                    <h3>${t.card2_title}</h3>
                    <p>${t.card2_desc}</p>
                    <a href="${t.card2_link}">⛏️ ${t.card2_title}</a>
                </div>
                <div class="card">
                    <h3>${t.card3_title}</h3>
                    <p>${t.card3_desc}</p>
                    <a href="${t.card3_link}">🐍 ${t.card3_title}</a>
                </div>
                <div class="card">
                    <h3>${t.card4_title}</h3>
                    <p>${t.card4_desc}</p>
                    <a href="${t.card4_link}">⚙️ ${t.card4_title}</a>
                </div>
            </div>
        `;
        document.getElementById('footer-text').innerText = t.footer_text;
        localStorage.setItem('doc_lang', lang);
        const selector = document.getElementById('languageSwitcher');
        if (selector) selector.value = lang;
    }

    const savedLang = localStorage.getItem('doc_lang') || 'ru';
    setLanguage(savedLang);
    document.getElementById('languageSwitcher').addEventListener('change', (e) => {
        setLanguage(e.target.value);
    });
</script>
